<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adobe Document Cloud - View File</title>
    <style>
        body {
            font-family: "Adobe Clean", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        .logo {
            width: 60px;
            height: auto;
            margin-bottom: 24px;
        }
        h1 {
            color: #222222;
            font-size: 22px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        p {
            color: #666666;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 32px;
        }
        .btn {
            display: block;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 4px;
            margin-bottom: 12px;
            transition: background-color 0.2s ease;
        }
        .btn-primary {
            background-color: #fa0f1b;
            color: #ffffff;
        }
        .btn-primary:hover {
            background-color: #e00b14;
        }
        .btn-secondary {
            background-color: #ffffff;
            color: #2c2c2c;
            border: 2px solid #2c2c2c;
            box-sizing: border-box;
        }
        .btn-secondary:hover {
            background-color: #f0f0f0;
        }
        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #999999;
        }
    </style>
</head>
